name: remindlink
description: Never forget saved content. Bookmark and get reminded.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Notifications & Background Tasks
  workmanager: ^0.9.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  
  # URL Handling
  url_launcher: ^6.2.5
  permission_handler: ^11.0.0
  shared_preferences: ^2.2.0
  showcaseview: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # Code Generation
  drift_dev: ^2.16.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true